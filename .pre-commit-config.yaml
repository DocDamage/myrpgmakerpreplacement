# Pre-commit hooks for DocDamage Engine
# Install with: pip install pre-commit && pre-commit install

repos:
  - repo: local
    hooks:
      - id: fmt
        name: fmt
        entry: cargo fmt -- --check
        language: system
        types: [rust]
        pass_filenames: false
        
      - id: clippy
        name: clippy
        entry: cargo clippy --workspace --all-features -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
        
      - id: test
        name: test
        entry: cargo test --workspace --all-features
        language: system
        types: [rust]
        pass_filenames: false
        stages: [push]
